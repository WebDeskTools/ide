<!DOCTYPE html> <html lang="tr"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <title>Eğitim Portalı | Güvenli İzleme</title>     <style>         :root { --primary: #58a6ff; --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --success: #238636; }         body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }         .container { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; width: 90%; text-align: center; }         h2 { color: var(--primary); margin-bottom: 10px; }         .upload-area { border: 2px dashed var(--border); padding: 30px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 20px 0; position: relative; }         .upload-area:hover { border-color: var(--primary); background: #1c2128; }         input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }         .btn { background-color: var(--success); color: white; border: none; padding: 15px 30px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; transition: 0.3s; }         .btn:hover { background-color: #2ea043; }         .btn:disabled { background-color: #21262d; color: #484f58; cursor: not-allowed; }         .status-msg { margin-top: 15px; font-size: 13px; color: #8b949e; }     </style>     <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script> </head> <body>  <div class="container">     <h2>Web-Based 3D Terrain & Industrial Printing Engine Mastery</h2>        <div class="upload-area">         <span id="fileName">Dosyayı Buraya Sürükleyin</span>         <input type="file" id="pdfInput" accept="application/pdf">     </div>      <button id="openBtn" class="btn" disabled>DERS HTML KOD Aç</button>     <p class="status-msg">Not: İçerik koruma altındadır; kopyalanamaz veya indirilemez.</p> </div>  <script> pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.worker.min.js';  const pdfInput = document.getElementById('pdfInput'); const openBtn = document.getElementById('openBtn'); const fileNameDisplay = document.getElementById('fileName');  pdfInput.onchange = (e) => {     if (e.target.files.length > 0) {         fileNameDisplay.innerText = e.target.files[0].name;         openBtn.disabled = false;     } };  openBtn.onclick = async () => {     const file = pdfInput.files[0];     openBtn.disabled = true;     openBtn.innerText = "Hazırlanıyor...";      try {         const arrayBuffer = await file.arrayBuffer();         const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;         let asciiStr = "";          for (let i = 1; i <= pdf.numPages; i++) {             const page = await pdf.getPage(i);             const content = await page.getTextContent();             asciiStr += content.items.map(item => item.str.replace(/\s+/g, '')).join('');         }          const digits = asciiStr.replace(/[^0-9]/g, '');         let decodedHtml = "";         for (let i = 0; i < digits.length; i += 8) {             const code = parseInt(digits.substring(i, i + 8), 10);             if (!isNaN(code)) decodedHtml += String.fromCharCode(code);         }          if (decodedHtml.length < 10) throw new Error("Dosya doğrulanamadı.");            const securityShield = `             <script>                             document.addEventListener('contextmenu', e => e.preventDefault());                 document.addEventListener('selectstart', e => e.preventDefault());                               document.onkeydown = e => {                     if (e.keyCode == 123 || (e.ctrlKey && [85, 83, 73, 74].includes(e.keyCode))) {                         return false;                     }                 };                                  setInterval(() => { debugger; }, 100);                                if (window.location.protocol === 'view-source:') {                     window.location.href = 'about:blank';                 }                                  console.log("%cKorumalı İzleme Modu Aktif", "color:cyan; font-size:20px; font-weight:bold;");             <\/script>             <style>                                 body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }             </style>         `;                  const blob = new Blob([securityShield + decodedHtml], { type: 'text/html;charset=utf-8' });         const bUrl = URL.createObjectURL(blob);                  const win = window.open(bUrl, '_blank');         if(!win) alert("Pop-up engelleyiciyi kapatıp tekrar deneyin.");                  openBtn.disabled = false;         openBtn.innerText = "İçeriği Güvenli Modda Aç";      } catch (err) {         alert("Hata: " + err.message);         openBtn.disabled = false;         openBtn.innerText = "Yeniden Dene";     } }; </script> </body> </html>
